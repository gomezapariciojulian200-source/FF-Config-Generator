<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FF Sensibilidad Pro</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:url("https://wallpapercave.com/wp/wp7418474.jpg");
background-size:cover;
background-attachment:fixed;
}

.container{
background:rgba(0,0,0,0.7);
padding:30px;
margin:40px;
border-radius:15px;
}

h1{
color:#ff3c00;
font-size:40px;
}

select,button,input{
padding:15px;
font-size:18px;
margin:10px;
border-radius:10px;
border:none;
}

button{
background:#ff3c00;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#ff0000;
}

.resultado{
font-size:22px;
margin-top:20px;
}

.youtube{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>Generador de Sensibilidad FF</h1>

<p>Selecciona tu tipo de dispositivo</p>

<select id="device">
<option value="baja">Gama Baja</option>
<option value="media">Gama Media</option>
<option value="alta">Gama Alta</option>
</select>

<p>Selecciona tu FPS</p>

<select id="fps">
<option value="60">60 FPS</option>
<option value="90">90 FPS</option>
<option value="120">120 FPS</option>
</select>

<p>Tu DPI</p>

<input id="dpi" placeholder="Ejemplo 400">

<br>

<button onclick="generar()">GENERAR SENSIBILIDAD</button>

<div class="resultado" id="resultado"></div>

<div class="youtube">
<a href="https://www.youtube.com/@julixnxzz" target="_blank">
Suscríbete a mi canal
</a>
</div>

</div>

<script>

function generar(){

window.open("https://www.youtube.com/@julixnxzz","_blank");

setTimeout(function(){

let device = document.getElementById("device").value;
let dpi = document.getElementById("dpi").value;

let general=90;
let rojo=85;
let mira2=80;
let mira4=75;

if(device=="baja"){
general=95; rojo=92; mira2=88; mira4=80;
}

if(device=="media"){
general=92; rojo=88; mira2=82; mira4=75;
}

if(device=="alta"){
general=88; rojo=84; mira2=78; mira4=70;
}

document.getElementById("resultado").innerHTML=
"General: "+general+"<br>"+
"Punto Rojo: "+rojo+"<br>"+
"Mira 2X: "+mira2+"<br>"+
"Mira 4X: "+mira4+"<br>"+
"DPI recomendado: "+dpi;

},5000);

}

window.open("https://youtube.com/", "_blank");

let device = document.getElementById("device").value;
let fps = document.getElementById("fps").value;
let dpi = document.getElementById("dpi").value;

let general = 90;
let rojo = 85;
let mira2 = 80;
let mira4 = 75;

if(device=="baja"){
general=95; rojo=92; mira2=88; mira4=80;
}

if(device=="media"){
general=92; rojo=88; mira2=82; mira4=75;
}

if(device=="alta"){
general=88; rojo=84; mira2=78; mira4=70;
}

document.getElementById("resultado").innerHTML =
"General: "+general+"<br>"+
"Punto Rojo: "+rojo+"<br>"+
"Mira 2X: "+mira2+"<br>"+
"Mira 4X: "+mira4+"<br>"+
"DPI recomendado: "+dpi;

}

</script>

</body>
</html>
