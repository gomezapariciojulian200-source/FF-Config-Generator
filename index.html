<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Generador Sensibilidad FF</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
background:url("https://wallpapercave.com/wp/wp7418474.jpg");
background-size:cover;
background-attachment:fixed;
}

.container{
background:rgba(0,0,0,0.7);
margin:40px;
padding:30px;
border-radius:15px;
}

h1{
font-size:40px;
color:#ff3c00;
}

select,input{
padding:12px;
font-size:18px;
margin:10px;
border-radius:10px;
border:none;
}

button{
padding:15px 30px;
font-size:20px;
background:#ff3c00;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:red;
}

.resultado{
font-size:22px;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Generador Sensibilidad Free Fire</h1>

<p>Tipo de dispositivo</p>

<select id="device">
<option value="baja">Gama baja</option>
<option value="media">Gama media</option>
<option value="alta">Gama alta</option>
</select>

<p>FPS del juego</p>

<select id="fps">
<option value="60">60 FPS</option>
<option value="90">90 FPS</option>
<option value="120">120 FPS</option>
</select>

<p>DPI de tu celular</p>

<input id="dpi" placeholder="Ejemplo 400">

<br>

<button onclick="generar()">GENERAR SENSIBILIDAD</button>

<div class="resultado" id="resultado"></div>

<br>

<a href="https://www.youtube.com/@julixnxzz" target="_blank">
<button>Suscribete a mi canal</button>
</a>

</div>

<script>

function generar(){

window.open("https://www.youtube.com/@julixnxzz","_blank");

setTimeout(function(){

let device=document.getElementById("device").value;
let dpi=document.getElementById("dpi").value;

let general;
let rojo;
let mira2;
let mira4;

if(device=="baja"){
general=95;
rojo=92;
mira2=88;
mira4=80;
}

if(device=="media"){
general=92;
rojo=88;
mira2=82;
mira4=75;
}

if(device=="alta"){
general=88;
rojo=84;
mira2=78;
mira4=70;
}

document.getElementById("resultado").innerHTML=
"General: "+general+"<br>"+
"Punto Rojo: "+rojo+"<br>"+
"Mira 2X: "+mira2+"<br>"+
"Mira 4X: "+mira4+"<br>"+
"DPI recomendado: "+dpi;

},5000);

}

</script>

</body>
</html>
