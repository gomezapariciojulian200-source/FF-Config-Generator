<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Generador Sensibilidad Free Fire</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
background:url("https://wallpapercave.com/wp/wp7418474.jpg");
background-size:cover;
background-attachment:fixed;
}

.container{
background:rgba(0,0,0,0.75);
margin:40px;
padding:30px;
border-radius:15px;
}

h1{
font-size:40px;
color:#ff3c00;
}

select,input{
padding:12px;
font-size:18px;
margin:10px;
border-radius:10px;
border:none;
}

button{
padding:16px 35px;
font-size:20px;
background:#ff3c00;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:red;
}

.resultado{
font-size:22px;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Generador Sensibilidad Free Fire</h1>

<p>Tipo de dispositivo</p>

<select id="device">
<option value="baja">Gama baja</option>
<option value="media">Gama media</option>
<option value="alta">Gama alta</option>
</select>

<p>FPS del juego</p>

<select id="fps">
<option value="60">60 FPS</option>
<option value="90">90 FPS</option>
<option value="120">120 FPS</option>
</select>

<p>DPI de tu celular</p>

<input id="dpi" placeholder="Ejemplo 400">

<br>

<button onclick="generar()">GENERAR SENSIBILIDAD</button>

<div class="resultado" id="resultado"></div>

<br><br>

<a href="https://www.youtube.com/@julixnxzz" target="_blank">
<button>Suscribete a mi canal</button>
</a>

</div>

<script>

function generar(){

window.open("https://www.youtube.com/@julixnxzz","_blank");

setTimeout(function(){

let device=document.getElementById("device").value;
let dpi=parseInt(document.getElementById("dpi").value) || 400;

let general;
let rojo;
let mira2;
let mira4;
let awm;
let boton;

if(device=="baja"){
general=195;
rojo=190;
mira2=180;
mira4=170;
awm=150;
boton=75;
}

if(device=="media"){
general=185;
rojo=180;
mira2=170;
mira4=160;
awm=145;
boton=70;
}

if(device=="alta"){
general=175;
rojo=170;
mira2=160;
mira4=150;
awm=135;
boton=65;
}

document.getElementById("resultado").innerHTML=
"General: "+general+"<br>"+
"Punto Rojo: "+rojo+"<br>"+
"Mira 2X: "+mira2+"<br>"+
"Mira 4X: "+mira4+"<br>"+
"AWM: "+awm+"<br>"+
"Tamaño botón de disparo: "+boton+"<br>"+
"DPI recomendado: "+dpi;

},5000);

}

</script>

</body>
</html>
